<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <title> Info RentCar </title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
  </head>
  <body>
    <form>
      <p> Nombre: <input type="text" name="nombre" size="40"></p>
      <p> Año de nacimiento: <input type="number" name="nacido" min="1900"></p>
      <p> Sexo:
        <input type="radio" name="hm" value="h"> Hombre
        <input type="radio" name="hm" value="m"> Mujer
      </p>
      Fecha alquilar: <input type="date" name="fecha">
      Hora: <input type="time" name="hora">
      <p> Tipo de carro:
        <input type="radio" name="hc" value="h"> Honda Civic 2021
        <input type="radio" name="th" value="t"> Toyota Hilux 2021
        <input type="radio" name="ns" value="n"> Nissan Kicks 2021
      </p>
      <button> Enviar </button>
      <button type="reset"> Borrar </button>
      <br>
      <br>
      <br>
    </form>
    <a href="index.html">
      <input type="button" name="btnGo" id="btnGo" value="Volver">
    </a>
  </body>
</html>
